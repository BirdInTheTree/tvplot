<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>TV Plotlines Viewer</title>
<style>
/* {{STYLE}} */
</style>
</head>
<body>

<!-- Welcome screen -->
<section id="screen-welcome" class="screen active">
  <div class="welcome-container">
    <h1 class="welcome-title">tvplotlines</h1>
    <p class="welcome-tagline">see the structure of any TV series</p>

    <form id="analyze-form" class="analyze-form" autocomplete="off">
      <input id="analyze-show" type="text" class="analyze-input analyze-input-show"
             placeholder="Series, e.g. Breaking Bad" required>
      <input id="analyze-season" type="number" class="analyze-input analyze-input-season"
             placeholder="Season" min="1" value="1" required>
      <button type="submit" class="analyze-submit">Analyze</button>
    </form>

    <div class="welcome-secondary">
      <button id="btn-play" class="welcome-link">Watch demo</button>
      <span class="welcome-sep">·</span>
      <a id="btn-skip" class="welcome-link" href="#">Skip to upload &#8594;</a>
    </div>
  </div>
</section>

<!-- Grid screen -->
<section id="screen-grid" class="screen">
  <nav class="toolbar">
    <div class="toolbar-left">
      <select id="series-select" class="toolbar-select"></select>
      <span id="grid-title" class="toolbar-title"></span>
    </div>
    <div class="toolbar-center">
      <button id="btn-tab-grid" class="btn-nav btn-nav-active">Grid</button>
      <button id="btn-tab-analytics" class="btn-nav">Analytics</button>
    </div>
    <div class="toolbar-right">
      <button id="btn-load" class="btn-nav" title="Load synopses">+ Load</button>
      <button id="btn-export" class="btn-nav btn-export-trigger" title="Export">Export</button>
      <button id="btn-llm-settings" class="btn-nav" title="LLM Settings">LLM</button>
      <button id="btn-onboarding" class="btn-nav" title="Watch onboarding">?</button>
      <button id="btn-dark" class="btn-nav" title="Toggle dark mode">&#9790;</button>
    </div>
  </nav>
  <div id="grid-container"></div>
</section>

<!-- Analytics screen -->
<section id="screen-analytics" class="screen">
  <nav class="toolbar">
    <div class="toolbar-left">
      <select class="toolbar-select" disabled style="visibility:hidden"></select>
      <span class="toolbar-title">Analytics</span>
    </div>
    <div class="toolbar-center">
      <button class="btn-nav" onclick="_setTab('grid')">Grid</button>
      <button class="btn-nav btn-nav-active">Analytics</button>
    </div>
    <div class="toolbar-right">
      <button class="btn-nav" onclick="_showDropZone()" title="Load synopses">+ Load</button>
      <button class="btn-nav btn-export-trigger" title="Export">Export</button>
      <button class="btn-nav" onclick="toggleDark()" title="Toggle dark mode">&#9790;</button>
    </div>
  </nav>
  <div id="analytics-container"></div>
</section>

<!-- Drop zone overlay for JSON import -->
<div id="drop-zone" class="drop-zone-overlay hidden">
  <div class="drop-zone-box">
    <div class="drop-zone-icon">&#128194;</div>
    <p>Drop a JSON result or .txt synopses here</p>
    <p class="drop-zone-hint">or</p>
    <label class="btn" for="file-upload">Choose files</label>
    <input type="file" id="file-upload" accept=".json,.txt" multiple hidden>
    <button id="drop-zone-close" class="drop-zone-close">&times;</button>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-content" class="modal-content">
    <button id="modal-close" class="modal-close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Export dropdown menu (positioned dynamically near the clicked button) -->
<div id="export-menu" class="export-menu hidden">
  <button onclick="_handleExport('json')">JSON</button>
  <button onclick="_handleExport('txt')">TXT</button>
  <button onclick="_handleExport('csv')">CSV</button>
  <button onclick="_handleExport('fdx')">Final Draft (.fdx)</button>
  <button onclick="_handleExport('pdf')">PDF</button>
</div>

<!-- Demo data (injected by build.py) -->
<script id="demo-data" type="application/json">
/* {{DEMO_DATA}} */
</script>

<script>
/* {{APP_JS}} */
</script>

</body>
</html>
